<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GoDive friend invite</title>
  <meta name="robots" content="noindex">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 2rem; line-height: 1.5; color: #0d3b4c; }
    a { color: #00897b; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Open in GoDive</h1>
  <p id="status">Opening the GoDive app…</p>
  <p><a id="open-app" href="#">Tap here if nothing happens</a></p>
  <script>
    (function () {
      var parts = window.location.pathname.split("/").filter(Boolean);
      var token = parts.length >= 2 && parts[0] === "invite" ? parts[1] : "";
      if (!/^[a-f0-9]{32}$/i.test(token)) {
        document.getElementById("status").textContent = "This invite link doesn’t look valid.";
        document.getElementById("open-app").style.display = "none";
        return;
      }
      var appURL = "godive://invite/" + token.toLowerCase();
      var link = document.getElementById("open-app");
      link.href = appURL;
      link.textContent = "Open GoDive";
      window.location.replace(appURL);
    })();
  </script>
</body>
</html>
